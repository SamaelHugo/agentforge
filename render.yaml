# Render Blueprint — deploys the AgentForge backend (free web service).
# Render dashboard → New → Blueprint → connect this repo → it reads this file.
# Auto-deploys on every push to the default branch.
services:
  - type: web
    name: agentforge-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Allow the Vercel frontend to call the API (tighten to your domain later).
      - key: CORS_ORIGINS
        value: "*"
      # LLM key — Render prompts for this at blueprint creation (kept secret).
      - key: OPENAI_API_KEY
        sync: false
