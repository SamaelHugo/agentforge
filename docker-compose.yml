# Full local stack: Postgres (pgvector) + FastAPI backend + Next.js frontend.
#   docker compose up --build
# Then open http://localhost:3000  (API on http://localhost:8000).
# Works offline (mock engine); export ANTHROPIC_API_KEY to use live Claude.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: agentforge
      POSTGRES_DB: agentforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://agentforge:agentforge@db:5432/agentforge
      CORS_ORIGINS: http://localhost:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
